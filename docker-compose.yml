# FIX #14: Removed deprecated version field

services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G

  vllm:
    image: vllm/vllm-openai:latest
    container_name: rag-vllm
    ports:
      - "8001:8000"
    volumes:
      - model_cache:/root/.cache/huggingface
    command: >
      --model ${LLM_MODEL:-TheBloke/Llama-3.3-70B-Instruct-AWQ}
      --quantization awq
      --dtype auto
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - gpu

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    profiles:
      - dev

  api:
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  model_cache:
  ollama_data:
